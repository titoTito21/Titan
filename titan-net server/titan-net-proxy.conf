# Titan-Net OAuth reverse proxy (Apache 2.4)
# Forwards /oauth/* and /api/oauth/* on titosofttitan.com to the local
# titan-net HTTP server on :8000. Required because Spotify/Allegro demand
# an HTTPS redirect URI.
#
# Deployed by: deploy_apache_proxy.sh
# Activated with: a2enconf titan-net-proxy

ProxyRequests Off
ProxyPreserveHost On

# titan-net HTTP server already terminates TLS on :8000 (uses the same
# Let's Encrypt cert as Apache). Talk to it over HTTPS and skip cert
# checking for the loopback hop - the cert is for titosofttitan.com,
# not 127.0.0.1.
SSLProxyEngine On
SSLProxyVerify None
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyCheckPeerExpire off

# Spotify/Allegro redirect target
<Location /oauth/>
    ProxyPass        https://127.0.0.1:8000/oauth/
    ProxyPassReverse https://127.0.0.1:8000/oauth/
</Location>

# Desktop-client API: token fetch, status, disconnect
<Location /api/oauth/>
    ProxyPass        https://127.0.0.1:8000/api/oauth/
    ProxyPassReverse https://127.0.0.1:8000/api/oauth/
</Location>
