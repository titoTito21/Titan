# Titan-Net reverse proxy + static portal (Apache 2.4)
# 1. /oauth/* and /api/oauth/* — OAuth broker on :8000 (HTTPS upstream)
# 2. /api/*                    — REST API on :8000 (HTTPS upstream)
# 3. /titannet/*               — accessible web portal (static, served from disk)
# Browser-to-WebSocket traffic goes direct to wss://titosofttitan.com:8001
# (server.py terminates TLS using the same Let's Encrypt cert), so no
# WebSocket proxy is required here.
#
# Deployed by: deploy_apache_proxy.sh
# Activated with: a2enconf titan-net-proxy

ProxyRequests Off
ProxyPreserveHost On

# Large package uploads (up to 1GB) can take many minutes over a slow uplink.
# Apache's default Timeout (60s) governs both how long the proxy waits on the
# backend and the gap allowed between client TCP packets, so a long upload is
# torn down mid-transfer. Raise it to 1800s to match the client's read timeout
# (upload_app in titan_net.py) and the per-Location ProxyPass timeout below.
Timeout 1800
ProxyTimeout 1800

# mod_reqtimeout enforces a minimum receive rate on the request body. The
# stock policy (body=20,MinRate=500) demands 500 B/s; a poor or bursty uplink
# can dip below that and get cut off. Loosen the floor and give a longer
# initial grace window so slow-but-real uploads survive. mod_reqtimeout is a
# no-op if the module isn't loaded, so guard with IfModule.
<IfModule mod_reqtimeout.c>
    RequestReadTimeout body=30,MinRate=200
</IfModule>

# titan-net HTTP server already terminates TLS on :8000 (uses the same
# Let's Encrypt cert as Apache). Talk to it over HTTPS and skip cert
# checking for the loopback hop - the cert is for titosofttitan.com,
# not 127.0.0.1.
SSLProxyEngine On
SSLProxyVerify None
SSLProxyCheckPeerCN off
SSLProxyCheckPeerName off
SSLProxyCheckPeerExpire off

# Pass real client IP to aiohttp so Cerberus sees the right source.
RequestHeader set X-Forwarded-For "%{REMOTE_ADDR}s"

# Spotify/Allegro redirect target
<Location /oauth/>
    ProxyPass        https://127.0.0.1:8000/oauth/
    ProxyPassReverse https://127.0.0.1:8000/oauth/
</Location>

# Desktop-client + browser portal REST API
# Allow large package uploads (5GB + 16MB multipart/proxy overhead). Apache's
# default LimitRequestBody is unlimited, but setting it explicitly here keeps
# the proxy in step with the app's Config.MAX_UPLOAD_SIZE (set via the
# server's .env: MAX_UPLOAD_SIZE) and caps abuse. If MAX_UPLOAD_SIZE changes,
# bump this to match: value = MAX_UPLOAD_SIZE + 16777216 (bytes).
#
# timeout=1800: a 1GB package over a slow uplink can take many minutes to
# stream through the proxy to the backend. Without an explicit timeout the
# ProxyPass worker inherits Apache's global Timeout (default 60s) and aborts
# the transfer mid-upload — the request never reaches handle_upload and the
# client sees a timeout despite its own 1800s read timeout. Keep this in step
# with the client's read timeout in upload_app (titan_net.py).
<Location /api/>
    LimitRequestBody 5385486336
    ProxyPass        https://127.0.0.1:8000/api/ timeout=1800
    ProxyPassReverse https://127.0.0.1:8000/api/
</Location>

# Accessible web portal — static files served directly from disk for speed.
# Aliased on Apache; aiohttp also serves /titannet/ as a fallback when
# Apache is not yet configured (see http_server.py setup_routes).
#
# IMPORTANT: visitors landing on /titannet (no trailing slash) MUST be
# redirected to /titannet/ rather than served index.html in place.
# Serving in place leaves the URL bar at /titannet, so every relative link
# in the page (href="login.html", href="repository.html",
# src="sounds/new_message.ogg") resolves to the document root and
# returns 404. The 301 forces the browser to /titannet/ where relative
# URLs resolve correctly.
RedirectMatch 301 ^/titannet$ /titannet/
Alias /titannet/ /opt/titan-net/web/

<Directory /opt/titan-net/web/>
    Options -Indexes +FollowSymLinks
    AllowOverride None
    Require all granted

    # Security headers for the portal
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "DENY"
    Header always set Referrer-Policy "no-referrer-when-downgrade"
    Header always set Permissions-Policy "microphone=(self), camera=()"

    # Don't cache HTML so updates ship immediately
    <FilesMatch "\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
    </FilesMatch>
    # Force JS/CSS revalidation on each load — the portal evolves fast
    # and stale i18n / chat bundles produce confusing "key shown verbatim"
    # bugs. ETags keep transfers cheap when nothing changed.
    <FilesMatch "\.(css|js)$">
        Header set Cache-Control "no-cache, must-revalidate"
    </FilesMatch>
    FileETag MTime Size
</Directory>
