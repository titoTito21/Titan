<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title data-i18n="reset.title">Reset password — Titan-Net</title>
  <link rel="stylesheet" href="css/titan.css?v=20260526a">
</head>
<body class="page">
  <a href="#main" class="skip-link" data-i18n="skip">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="row">
      <a href="index.html" class="brand" data-i18n="brand">Titan-Net</a>
      <nav class="primary-nav" aria-label="Main navigation" data-i18n-attr="aria-label:nav.menu">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="login.html" data-i18n="nav.login">Log in</a></li>
        </ul>
      </nav>
      <div class="toolbar" role="group" aria-label="Display preferences">
        <label for="lang-select" class="sr-only" data-i18n="lang.label">Language</label>
        <select id="lang-select" aria-label="Language" data-i18n-attr="aria-label:lang.label">
          <option value="en">English</option>
          <option value="pl">Polski</option>
        </select>
        <label for="theme-select" class="sr-only" data-i18n="theme.label">Color theme</label>
        <select id="theme-select" aria-label="Color theme" data-i18n-attr="aria-label:theme.label">
          <option value="auto" data-i18n="theme.auto">System</option>
          <option value="light" data-i18n="theme.light">Light</option>
          <option value="dark" data-i18n="theme.dark">Dark</option>
        </select>
      </div>
    </div>
  </header>

  <main id="main">
    <h1 data-i18n="reset.title">Reset password</h1>
    <p data-i18n="reset.lead">Choose a new password for your account.</p>

    <div id="form-alert" role="alert" aria-live="assertive" hidden></div>

    <form id="reset-form" novalidate style="max-width:420px">
      <div class="field">
        <label for="rp-token" data-i18n="reset.token">Reset token</label>
        <input id="rp-token" name="token" type="text" required aria-required="true"
               aria-describedby="rp-token-help">
        <span class="help muted" id="rp-token-help" data-i18n="reset.token_help">Filled in automatically from your email link.</span>
      </div>
      <div class="field">
        <label for="rp-password" data-i18n="reset.password">New password</label>
        <input id="rp-password" name="password" type="password" autocomplete="new-password"
               required aria-required="true" minlength="8">
      </div>
      <div class="field">
        <label for="rp-password2" data-i18n="reset.password2">Repeat new password</label>
        <input id="rp-password2" name="password2" type="password" autocomplete="new-password"
               required aria-required="true" minlength="8">
      </div>
      <p>
        <button type="submit" id="rp-submit" data-i18n="reset.submit">Reset password</button>
      </p>
      <p class="muted"><a href="login.html" data-i18n="reset.back_login">Back to log in</a></p>
    </form>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p><span data-i18n="footer.copy">Titan-Net</span></p>
  </footer>

  <div id="live-polite" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="js/i18n.js?v=20260526a"></script>
  <script src="js/app.js?v=20260526a"></script>
  <script src="js/sounds.js?v=20260526a"></script>
  <script src="js/api.js?v=20260526a"></script>
  <script>
    (function () {
      const t = Titan.t;
      const form = document.getElementById('reset-form');
      const alertEl = document.getElementById('form-alert');
      function showAlert(msg, kind) {
        alertEl.hidden = false;
        alertEl.textContent = msg;
        alertEl.className = 'alert ' + (kind === 'ok' ? 'alert-success' : 'alert-error');
        Titan.announce(msg);
      }
      // Prefill the token from the emailed link (?token=...).
      const params = new URLSearchParams(location.search);
      const tok = params.get('token');
      if (tok) document.getElementById('rp-token').value = tok;
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const token = document.getElementById('rp-token').value.trim();
        const p = document.getElementById('rp-password').value;
        const p2 = document.getElementById('rp-password2').value;
        if (!token || !p) { showAlert(t('err.required')); return; }
        if (p.length < 8) { showAlert(t('reset.too_short')); return; }
        if (p !== p2) { showAlert(t('reset.mismatch')); return; }
        const submit = document.getElementById('rp-submit');
        submit.disabled = true;
        try {
          const resp = await Titan.API.resetPassword(token, p);
          if (resp && resp.success) {
            showAlert(t('reset.done'), 'ok');
          } else {
            showAlert((resp && resp.error) || t('err.generic'));
            submit.disabled = false;
          }
        } catch (err) {
          showAlert(err.message || t('err.generic'));
          submit.disabled = false;
        }
      });
    })();
  </script>
</body>
</html>
