<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title data-i18n="verify.title">Verify email — Titan-Net</title>
  <link rel="stylesheet" href="css/titan.css?v=20260526a">
</head>
<body class="page">
  <a href="#main" class="skip-link" data-i18n="skip">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="row">
      <a href="index.html" class="brand" data-i18n="brand">Titan-Net</a>
      <nav class="primary-nav" aria-label="Main navigation" data-i18n-attr="aria-label:nav.menu">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="login.html" data-i18n="nav.login">Log in</a></li>
        </ul>
      </nav>
      <div class="toolbar" role="group" aria-label="Display preferences">
        <label for="lang-select" class="sr-only" data-i18n="lang.label">Language</label>
        <select id="lang-select" aria-label="Language" data-i18n-attr="aria-label:lang.label">
          <option value="en">English</option>
          <option value="pl">Polski</option>
        </select>
        <label for="theme-select" class="sr-only" data-i18n="theme.label">Color theme</label>
        <select id="theme-select" aria-label="Color theme" data-i18n-attr="aria-label:theme.label">
          <option value="auto" data-i18n="theme.auto">System</option>
          <option value="light" data-i18n="theme.light">Light</option>
          <option value="dark" data-i18n="theme.dark">Dark</option>
        </select>
      </div>
    </div>
  </header>

  <main id="main">
    <h1 data-i18n="verify.title">Verify email</h1>
    <div id="verify-status" role="status" aria-live="polite" data-i18n="verify.checking">Verifying your email…</div>
    <p class="muted"><a href="login.html" data-i18n="verify.back_login">Back to log in</a></p>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p><span data-i18n="footer.copy">Titan-Net</span></p>
  </footer>

  <div id="live-polite" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="js/i18n.js?v=20260526a"></script>
  <script src="js/app.js?v=20260526a"></script>
  <script src="js/sounds.js?v=20260526a"></script>
  <script src="js/api.js?v=20260526a"></script>
  <script>
    (function () {
      const t = Titan.t;
      const statusEl = document.getElementById('verify-status');
      const params = new URLSearchParams(location.search);
      const token = params.get('token');
      function set(msg) { statusEl.textContent = msg; Titan.announce(msg); }
      if (!token) { set(t('verify.no_token')); return; }
      (async function () {
        try {
          const resp = await Titan.API.verifyEmail(token);
          if (resp && resp.success) set(t('verify.ok'));
          else set((resp && resp.error) || t('verify.failed'));
        } catch (err) {
          set(err.message || t('verify.failed'));
        }
      })();
    })();
  </script>
</body>
</html>
