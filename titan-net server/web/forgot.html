<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title data-i18n="forgot.title">Recover password — Titan-Net</title>
  <link rel="stylesheet" href="css/titan.css?v=20260526a">
</head>
<body class="page">
  <a href="#main" class="skip-link" data-i18n="skip">Skip to main content</a>

  <header class="site-header" role="banner">
    <div class="row">
      <a href="index.html" class="brand" data-i18n="brand">Titan-Net</a>
      <nav class="primary-nav" aria-label="Main navigation" data-i18n-attr="aria-label:nav.menu">
        <ul>
          <li><a href="index.html" data-i18n="nav.home">Home</a></li>
          <li><a href="login.html" data-i18n="nav.login">Log in</a></li>
          <li><a href="register.html" data-i18n="nav.register">Sign up</a></li>
        </ul>
      </nav>
      <div class="toolbar" role="group" aria-label="Display preferences">
        <label for="lang-select" class="sr-only" data-i18n="lang.label">Language</label>
        <select id="lang-select" aria-label="Language" data-i18n-attr="aria-label:lang.label">
          <option value="en">English</option>
          <option value="pl">Polski</option>
        </select>
        <label for="theme-select" class="sr-only" data-i18n="theme.label">Color theme</label>
        <select id="theme-select" aria-label="Color theme" data-i18n-attr="aria-label:theme.label">
          <option value="auto" data-i18n="theme.auto">System</option>
          <option value="light" data-i18n="theme.light">Light</option>
          <option value="dark" data-i18n="theme.dark">Dark</option>
        </select>
      </div>
    </div>
  </header>

  <main id="main">
    <h1 data-i18n="forgot.title">Recover password</h1>
    <p data-i18n="forgot.lead">Enter your username or the email on your account. If a verified email is on file, we will send a reset link to it.</p>

    <div id="form-alert" role="alert" aria-live="assertive" hidden></div>

    <form id="forgot-form" novalidate style="max-width:420px">
      <div class="field">
        <label for="fp-identifier" data-i18n="forgot.identifier">Username or email</label>
        <input id="fp-identifier" name="identifier" type="text" autocomplete="username" required aria-required="true">
      </div>
      <p>
        <button type="submit" id="fp-submit" data-i18n="forgot.submit">Send reset link</button>
      </p>
      <p class="muted">
        <a href="login.html" data-i18n="forgot.back_login">Back to log in</a>
      </p>
    </form>
  </main>

  <footer class="site-footer" role="contentinfo">
    <p><span data-i18n="footer.copy">Titan-Net</span></p>
  </footer>

  <div id="live-polite" class="sr-only" role="status" aria-live="polite" aria-atomic="true"></div>

  <script src="js/i18n.js?v=20260526a"></script>
  <script src="js/app.js?v=20260526a"></script>
  <script src="js/sounds.js?v=20260526a"></script>
  <script src="js/api.js?v=20260526a"></script>
  <script>
    (function () {
      const t = Titan.t;
      const form = document.getElementById('forgot-form');
      const alertEl = document.getElementById('form-alert');
      function showAlert(msg, kind) {
        alertEl.hidden = false;
        alertEl.textContent = msg;
        alertEl.className = 'alert ' + (kind === 'ok' ? 'alert-success' : 'alert-error');
        Titan.announce(msg);
      }
      form.addEventListener('submit', async function (e) {
        e.preventDefault();
        const id = document.getElementById('fp-identifier').value.trim();
        if (!id) { showAlert(t('err.required')); return; }
        const submit = document.getElementById('fp-submit');
        submit.disabled = true;
        try {
          await Titan.API.forgotPassword(id);
        } catch (err) { /* generic response regardless */ }
        // Always a generic message (no account enumeration).
        showAlert(t('forgot.sent'), 'ok');
        submit.disabled = false;
      });
    })();
  </script>
</body>
</html>
